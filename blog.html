    date:'May 20, 2025', readTime:'5 min',
    content:`
      <h2>Android Phone Fast Karo — 10 Proven Tips</h2>
      <p>Kya aapka Android phone slow ho gaya hai? Ghabrao mat! Yeh 10 tips se aap apne phone ki speed dramatically improve kar sakte hain.</p>
      <h2>1. Unnecessary Apps Delete Karo</h2>
      <p>Jo apps aap use nahi karte unhe uninstall karo. Settings > Apps > Installed Apps mein jaao aur dekho kaunse apps zyada storage le rahe hain.</p>
      <h2>2. Cache Clear Karo</h2>
      <p>Settings > Storage > Cached Data mein jaao aur cache clear karo. Yeh free space create karta hai aur performance improve karta hai.</p>
      <h2>3. Live Wallpaper Band Karo</h2>
      <p>Live wallpapers battery aur RAM dono use karte hain. Simple static wallpaper use karo.</p>
      <h2>4. Background Apps Band Karo</h2>
      <p>Developer Options mein jaao aur "Background Process Limit" set karo. Yeh RAM bachata hai.</p>
      <h2>5. Animation Speed Kam Karo</h2>
      <p>Developer Options > Window Animation Scale, Transition Animation Scale — sab 0.5x ya off kar do. Phone instantly faster lagega!</p>
      <h2>6. Storage Khaali Karo</h2>
      <p>Phone ka storage 80% se zyada na bharo. Old photos Google Photos mein backup karke delete karo.</p>
      <h2>7. Regular Restart Karo</h2>
      <p>Hafte mein ek baar phone restart karo — RAM clear hota hai aur performance improve hoti hai.</p>
      <h2>8. Auto-Sync Limit Karo</h2>
      <p>Settings > Accounts mein unnecessary account sync band karo.</p>
      <h2>9. Lite Version Apps Use Karo</h2>
      <p>Facebook Lite, YouTube Go, Instagram Lite — yeh apps kam RAM use karte hain.</p>
      <h2>10. Software Update Karo</h2>
      <p>Latest Android updates mein performance improvements hote hain — update karte raho.</p>
      <p>In tips se aapka phone definitely faster ho jaayega!</p>
    `

      <h2>Python 30 Din mein Seekho — Complete Roadmap</h2>
      <p>Python duniya ki sabse popular programming language hai. Simple syntax aur powerful features ki wajah se yeh beginners ke liye perfect hai.</p>
      <h2>Python Kyun Seekhein?</h2>
      <ul>
        <li>Sabse aasaan programming language — English jaisi syntax</li>
        <li>AI/ML ke liye #1 choice</li>
        <li>High salary — ₹5 lakh se ₹50 lakh per year</li>
        <li>Data Science, Web Development, Automation sab mein use</li>
      </ul>
      <h2>Week 1: Basics (Din 1-7)</h2>
      <ul>
        <li>Din 1-2: Variables, Data Types, Print</li>
        <li>Din 3-4: Conditions (if/else)</li>
        <li>Din 5-6: Loops (for, while)</li>
        <li>Din 7: Practice problems</li>
      </ul>
      <h2>Week 2: Functions & Data (Din 8-14)</h2>
      <ul>
        <li>Din 8-9: Functions</li>
        <li>Din 10-11: Lists, Tuples, Dictionaries</li>
        <li>Din 12-13: File handling</li>
        <li>Din 14: Mini project — Calculator</li>
      </ul>
      <h2>Week 3: OOP & Libraries (Din 15-21)</h2>

let currentCat = 'all';

function renderBlog(articles) {
  const grid = document.getElementById('blog-grid');
  if(!articles.length) { grid.innerHTML='<div style="color:var(--text2);text-align:center;padding:3rem;grid-column:1/-1">Koi article nahi mila 😔</div>'; return; }
  grid.innerHTML = articles.map(a => `
    <div class="blog-card" onclick="showArticle(${a.id})">
      <div class="blog-thumb" style="background:${a.bg}">${a.thumb}</div>
      <div class="blog-body">
        <span class="blog-cat ${a.badge}">${a.label}</span>
        <div class="blog-title">${a.title}</div>
        <div class="blog-excerpt">${a.excerpt}</div>
        <div class="blog-meta"><span>📅 ${a.date}</span><span>⏱️ ${a.readTime} read</span></div>
      </div>
    </div>
  `).join('');
}

function filterCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterBlog();
}

function filterBlog() {
  const q = document.getElementById('blog-search')?.value?.toLowerCase() || '';
  let filtered = ARTICLES;
  if(currentCat !== 'all') filtered = filtered.filter(a => a.cat === currentCat);
  if(q) filtered = filtered.filter(a => a.title.toLowerCase().includes(q) || a.excerpt.toLowerCase().includes(q));
  renderBlog(filtered);
}

function showArticle(id) {
  const article = ARTICLES.find(a => a.id === id);
  if(!article) return;
  document.getElementById('blog-list').classList.add('hidden');
  document.getElementById('article-view').classList.add('active');
  document.getElementById('article-content-area').innerHTML = `
    <div style="margin-bottom:1rem">
      <span class="blog-cat ${article.badge}" style="display:inline-block;padding:0.3rem 0.8rem;border-radius:20px;font-size:0.78rem;font-weight:600">${article.label}</span>
    </div>
    <h1 style="font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;margin-bottom:0.5rem;line-height:1.3">${article.title}</h1>
    <div style="color:var(--text2);font-size:0.82rem;margin-bottom:1.5rem">📅 ${article.date} &nbsp;|&nbsp; ⏱️ ${article.readTime} read</div>
    <div class="article-content">${article.content}</div>
    <div style="margin-top:1.5rem;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.2rem;text-align:center">
      <div style="margin-bottom:0.5rem;font-weight:600">Aur articles padhna hai?</div>
      <button onclick="showBlogList()" style="background:var(--accent);color:#fff;border:none;border-radius:8px;padding:0.6rem 1.5rem;cursor:pointer;font-weight:600">← Blog pe Wapas Jao</button>
    </div>
  `;
  window.scrollTo(0,0);
}

function showBlogList() {
  document.getElementById('blog-list').classList.remove('hidden');
  document.getElementById('article-view').classList.remove('active');
  window.scrollTo(0,0);
}

// Init
renderBlog(ARTICLES);
</script>
